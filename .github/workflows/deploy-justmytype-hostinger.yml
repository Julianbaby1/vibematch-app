name: Deploy JustMyType to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'justmytype/**'
      - '.github/workflows/deploy-justmytype-hostinger.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: justmytype
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://zsbchkyvzhxtthyrbavv.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_GeHgibtaDLJLo6GfWToVbw_IjPi2Lkq
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: justmytype/dist/
